{literal}
	<div class="delete-single-log modal fade" tabindex="-1" role="dialog">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal"
					        :aria-label="lang.modals.deleteSingleLogfile.close">
						<span aria-hidden="true">&times;</span>
					</button>
					
					<h4 class="modal-title">{{lang.modals.deleteSingleLogfile.title}}</h4>
				</div>
				
				<div class="modal-body">
					{{lang.modals.deleteSingleLogfile.text}}
				</div>
				
				<div class="modal-footer">
					<button type="button" class="btn btn-default" data-dismiss="modal">
						{{lang.modals.deleteSingleLogfile.close}}
					</button>
					
					<button class="btn btn-primary" @click="deleteSelectedLogfile">
						{{lang.modals.deleteSingleLogfile.confirm}}
					</button>
				</div>
			</div>
		</div>
	</div>
{/literal}
