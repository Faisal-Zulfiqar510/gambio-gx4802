{literal}
	<div class="delete-old-logs modal fade" tabindex="-1" role="dialog">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal"
					        :aria-label="lang.modals.deleteOldLogfiles.close">
						<span aria-hidden="true">&times;</span>
					</button>
					
					<h4 class="modal-title">{{lang.modals.deleteOldLogfiles.title}}</h4>
				</div>
				
				<div class="modal-body">
					<p>{{lang.modals.deleteOldLogfiles.text}}</p>
					<div class="form-group">
						<div class="row">
							<div class="col-md-2">
								<label for="age">{{ lang.modals.deleteOldLogfiles.days }}:</label>
							</div>
							<div class="col-md-4">
								<input type="number" step="1" min="1" id="age" v-model="days" class="form-control"/>
							</div>
						</div>
					</div>
				</div>
				
				<div class="modal-footer">
					<button type="button" class="btn btn-default" data-dismiss="modal">
						{{lang.modals.deleteOldLogfiles.close}}
					</button>
					
					<button class="btn btn-primary" @click="deleteOldLogfiles">{{lang.modals.deleteOldLogfiles.confirm}}
					</button>
				</div>
			</div>
		</div>
	</div>
{/literal}
