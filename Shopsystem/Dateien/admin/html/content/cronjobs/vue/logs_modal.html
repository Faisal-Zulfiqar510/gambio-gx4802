{literal}
	<script type="text/x-template" id="cronjobs-logs-modal">
		<div class="logs modal fade" tabindex="-1" role="dialog">
			<div class="modal-dialog" :class="modalSize">
				<div class="modal-content">
					<div class="modal-header">
						<button type="button"
								class="close"
								data-dismiss="modal"
								:aria-label="lang.button_close">
							<span aria-hidden="true">&times;</span>
						</button>

						<h4 class="modal-title">{{ lang.title_log_modal }} {{ cronjob.name }}</h4>
					</div>

					<div class="modal-body">
						<form v-if="success">
							<label for="log-message" v-text="lang.log_modal_last_messages" />
							<textarea readonly :value="log"></textarea>
						</form>
						<p v-else v-text="error" />
					</div>

					<div class="modal-footer">
						<button type="button"
								class="btn btn-default"
								data-dismiss="modal" v-text="lang.button_close" />
					</div>
				</div>
			</div>
		</div>
	</script>
{/literal}
