<div class="modal fade edit-modal" tabindex="-1" role="dialog">
	<div class="modal-dialog" role="document">
		<div class="modal-content">
			<div class="modal-header">
				<button type="button" class="close" data-dismiss="modal" aria-label="Close">
					<span aria-hidden="true">&times;</span>
				</button>
				<h4 class="modal-title">{$units.TEXT_QUANTITYUNIT}</h4>
			</div>
			<div class="modal-body">
				<div class="row">
					<div class="col-md-12">
						<p class="quantity-units-modal-info">{$units.TEXT_INFO_EDIT_INTRO}</p>
						<form class="form-horizontal">
							{* data is provided by quantity_units/overview.js *}
						</form>
					</div>
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-default" data-dismiss="modal">{$button.abort}</button>
				<button id="edit-quantity-units" type="button" class="btn btn-primary">{$button.update}</button>
			</div>
		</div>
