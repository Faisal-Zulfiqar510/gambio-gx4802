{literal}
<script type="text/x-template" id="delete-modal">
	<div class="delete-modal modal fade" tabindex="-1" role="dialog">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" :aria-label="lang.close">
						<span aria-hidden="true">&times;</span>
					</button>
					
					<h4 class="modal-title">{{ lang.title }}</h4>
				</div>
				
				<div class="modal-body" v-if="withdrawal !== undefined">
					<p>{{ lang.text }}</p>
					
					<div class="row">
						<div class="col-md-3"><b>{{ lang.labels.id }}:</b></div>
						<div class="col-md-9">{{ withdrawal.id }}</div>
					</div>
					<div class="row">
						<div class="col-md-3"><b>{{ lang.labels.date }}:</b></div>
						<div class="col-md-9">{{ withdrawal.date }}</div>
					</div>
					<div class="row">
						<div class="col-md-3"><b>{{ lang.labels.order }}:</b></div>
						<div class="col-md-9">{{ withdrawal.orderId }}</div>
					</div>
					<div class="row">
						<div class="col-md-3"><b>{{ lang.labels.customer }}:</b></div>
						<div class="col-md-9">{{ withdrawal.customer }}</div>
					</div>
				</div>
				
				<div class="modal-footer">
					<button type="button" class="btn btn-default" data-dismiss="modal">{{ lang.close }}</button>
					<button type="button" class="btn btn-primary" @click="confirm">{{ lang.confirm }}</button>
				</div>
			</div>
		</div>
	</div>
</script>
{/literal}
