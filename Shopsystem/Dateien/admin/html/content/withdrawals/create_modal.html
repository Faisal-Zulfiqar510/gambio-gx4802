{literal}
<script type="text/x-template" id="create-modal">
	<div class="create-modal modal fade" tabindex="-1" role="dialog">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" :aria-label="lang.close">
						<span aria-hidden="true">&times;</span>
					</button>
					
					<h4 class="modal-title">{{ lang.title }}</h4>
				</div>
				
				<div class="modal-body">
					<p>{{ lang.text }}</p>
					<div class="form-group">
						<div class="row">
							<div class="col-md-2">
								<label for="orderId">{{ lang.labels.orderId }}:</label>
							</div>
							<div class="col-md-4">
								<input id="orderId" v-model="orderId" @keyup="checkOrderId"
								       :class="'form-control ' + (orderIdOk? '' : 'invalid')"/>
							</div>
						</div>
					</div>
				</div>
				
				<div class="modal-footer">
					<button type="button" class="btn btn-default" data-dismiss="modal">{{ lang.close }}</button>
					<button type="button" class="btn btn-primary" @click="confirm">{{ lang.confirm }}</button>
				</div>
			</div>
		</div>
	</div>
</script>
{/literal}
