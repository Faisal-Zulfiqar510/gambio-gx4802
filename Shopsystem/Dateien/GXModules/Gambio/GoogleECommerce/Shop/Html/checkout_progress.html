{*
	Google Analytics checkout_progress partial

	Parameters
		$data - JSON encoded data (string)
*}

{block name="google_analytics_partials_checkout_progress"}
    {if cookie_consent_panel_is_installed()}
		<script
			data-managed="as-oil"
			data-type="text/javascript"
			data-purposes="4"
			type="as-oil"
		>
	{else}
		<script>
	{/if}
		gtag('event', 'checkout_progress', { items: {$data} });
	</script>
{/block}
